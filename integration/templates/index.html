<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NadlanScraper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Hebrew:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">

<!-- Server-rendered bootstrap state for the React app.
     Jinja substitutes values from your FastAPI view. -->
<script id="__bootstrap" type="application/json">
{{ {
  "stats": {
    "total": total_listings | default(0),
    "newToday": new_today | default(0),
    "hotDeals": high_score | default(0),
    "avgScore": avg_score | default(0)
  },
  "filters": {
    "city": current_city | default(''),
    "neighborhood": current_neighborhood | default(''),
    "minScore": current_min_score | default(0),
    "mamad": current_mamad | default(false),
    "status": current_status | default('all'),
    "sort": current_sort | default('deal_score')
  },
  "cities": cities | default([]),
  "neighborhoods": neighborhoods | default([])
} | tojson | safe }}
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-density="comfortable">
<div id="root"></div>
<script type="text/babel" data-presets="react" src="{{ url_for('static', path='/app.js') }}"></script>
</body>
</html>
